<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Received — Jordan Jozak</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0c0a0c;
      --ink: #f1ebe0;
      --ink-soft: #c4bdb0;
      --ink-mute: #8a8278;
      --copper: #c87f44;
      --copper-faint: rgba(200, 127, 68, 0.22);
      --rule: rgba(241, 235, 224, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.1s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    body::before {
      content: "";
      position: fixed;
      top: 40%;
      left: 50%;
      width: 95vw;
      height: 95vw;
      max-width: 1000px;
      max-height: 1000px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(200, 127, 68, 0.10) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      margin-bottom: 22px;
    }

    p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--ink-soft);
      margin-bottom: 40px;
    }

    a {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid var(--copper-faint);
      padding-bottom: 4px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    a:hover { color: var(--copper); border-bottom-color: var(--copper); }

    .mark {
      display: block;
      width: 56px;
      height: auto;
      margin: 0 auto 36px;
      color: var(--copper);
      opacity: 0.7;
    }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 110 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M 55,9.22 A 24,24 0 0,1 55,50.78 A 24,24 0 0,0 55,9.22 Z" fill="currentColor" opacity="0.08" />
      <circle cx="43" cy="30" r="24" fill="none" stroke="currentColor" stroke-width="0.55" />
      <circle cx="67" cy="30" r="24" fill="none" stroke="currentColor" stroke-width="0.55" />
      <circle cx="55" cy="30" r="0.7" fill="currentColor" opacity="0.9" />
    </svg>
    <h1>Received.</h1>
    <p>I read everything that arrives.</p>
    <a href="/">Back to the house</a>
  </main>
</body>
</html>
